services:
  - type: web
    name: agenttube-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # You will set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel URL after frontend is deployed
    healthCheckPath: /
